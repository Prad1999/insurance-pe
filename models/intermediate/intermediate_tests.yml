version: 2

models:
  - name: int_enquiries_deduped
    columns:
      - name: enquiry_version_key
        tests:
          - not_null
          - unique

  - name: int_policy_transactions
    columns:
      - name: policy_id
        tests:
          - not_null
      - name: transaction_event_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['MTA', 'BOLT_ON', 'CANCELLATION']

  - name: int_policy_revenue_summary
    columns:
      - name: policy_id
        tests:
          - not_null
          - unique

  - name: int_policy_retention_summary
    columns:
      - name: policy_id
        tests:
          - not_null
          - unique

  - name: int_policy_bolt_on_summary
    columns:
      - name: policy_id
        tests:
          - not_null
          - unique